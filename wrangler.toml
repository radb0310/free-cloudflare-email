name = "free-cloudflare-email"
main = "src/index.ts"
compatibility_date = "2024-10-31"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "email-system-db"
database_id = "dae8232a-fe53-4674-9a67-cce29c23fae9" # Replace with your actual database ID after creating

# Email routing bindings
[[send_email]]
name = "SEND_EMAIL"

# Cron trigger for email cleanup
[triggers]
crons = ["0 2 * * *"] # <-- Set your cron expression here

# Environment variables
[vars]
ENVIRONMENT = "development"
ADMIN_TOKEN = "admin-secret-token-change-this" # Change this to a secure token
